version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: trending-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: trending-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: trending-searches-kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trending-app
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - kafka
    environment:
      TRENDING_KAFKA_BROKERS: kafka:9092
      TRENDING_KAFKA_TOPIC: search-events
      TRENDING_CONSUMER_GROUP: trending-group
      TRENDING_REDIS_ADDR: redis:6379
      TRENDING_REDIS_PASSWORD: ""
      TRENDING_REDIS_DB: 0
      TRENDING_HTTP_PORT: 8080
      TRENDING_READ_TIMEOUT: 10s
      TRENDING_WRITE_TIMEOUT: 10s
      TRENDING_AGGREGATE_INTERVAL: 10s
      TRENDING_RATE_LIMIT_PER_USER: 10
    restart: unless-stopped
    
  prometheus:
    image: prom/prometheus:latest
    container_name: trending-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: trending-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
    - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data: